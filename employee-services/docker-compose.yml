services:
  employee-services:
    build: .
    container_name: employee-services
    ports:
      - "5000:8002"
    env_file: ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agents-net

networks:
  agents-net:
    external: true
