version: "3.8"

services:
  hr-platform:
    build: .
    container_name: nasiko-hr-platform
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_SECRET_KEY=${APP_SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite+aiosqlite:///./hr_platform.db
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.openai.com/v1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-jwt-production}
      - CHROMA_PERSIST_DIR=./chroma_data
    volumes:
      - hr-data:/app/hr_platform.db
      - hr-uploads:/app/uploads
      - hr-chroma:/app/chroma_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/admin/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  hr-data:
  hr-uploads:
  hr-chroma:
