services:
  analytics-agent:
    build: .
    container_name: analytics-agent
    ports:
      - "5000:8003"
    env_file: ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agents-net

networks:
  agents-net:
    external: true
